services:
  - type: web
    name: gato-api
    runtime: python
    buildCommand: pip install uv && uv sync --no-dev --frozen
    startCommand: uvicorn app.api.routes:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Gato API
      - key: APP_VERSION
        value: 0.1.0
      - key: DEBUG
        value: false
