repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files    # bloquea archivos > 500KB
      - id: detect-private-key         # detecta claves privadas
      - id: end-of-file-fixer          # asegura newline al final
      - id: trailing-whitespace        # elimina espacios al final
